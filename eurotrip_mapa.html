var routeSegments = [];
for (var i=0;i<stops.length-1;i++){
  var seg = L.polyline([[stops[i].lat,stops[i].lng],[stops[i+1].lat,stops[i+1].lng]],{color:stops[i+1].color,weight:3.5,opacity:0}).addTo(map);
  routeSegments.push(seg);
}

var markers = [];
stops.forEach(function(stop,idx){
  var sz = stop.nights>=4?36:stop.nights>=3?32:stop.nights>=2?28:24;
  var icon = L.divIcon({className:'',html:'<div style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+stop.color+'18;border:2px solid '+stop.color+'33;display:flex;align-items:center;justify-content:center;font-size:'+(sz>30?13:11)+'px;font-weight:700;color:'+stop.color+'77;transition:all 0.5s;" id="mi-'+idx+'">'+stop.id+'</div>',iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
  var popup = '<div class="popup-title">'+stop.emoji+' '+stop.name+'</div><div class="popup-dates">'+stop.dates+' &middot; '+stop.nights+' noches</div><div class="popup-text"><b>Hostel:</b> '+stop.hostel+'<br><b>Highlights:</b> '+stop.highlights.join(', ')+'<br><b>Transporte:</b> '+stop.transport+'</div>';
  markers.push(L.marker([stop.lat,stop.lng],{icon:icon}).addTo(map).bindPopup(popup,{maxWidth:280}));
});

var travelerIcon = L.divIcon({className:'',html:'<div id="traveler" style="font-size:30px;line-height:1;filter:drop-shadow(0 2px 5px rgba(0,0,0,0.3));transition:transform 0.1s;">\ud83e\uddd1\u200d\ud83c\udf92</div>',iconSize:[34,34],iconAnchor:[17,17]});
var travelerMarker = L.marker([stops[0].lat,stops[0].lng],{icon:travelerIcon,zIndexOffset:9999}).addTo(map);
var localTrail = L.polyline([],{color:'#6366f1',weight:2,opacity:0.35,dashArray:'4,6'}).addTo(map);
var footprints = [];

var progressStopsEl = document.getElementById('progressStops');
stops.forEach(function(s){var d=document.createElement('div');d.className='progress-dot';d.style.left=((s.startDay-1)/TOTAL_DAYS*100)+'%';d.title=s.name;progressStopsEl.appendChild(d);});

var listEl=document.getElementById('stops-list'),cards=[];
stops.forEach(function(stop,idx){
  var c=document.createElement('div');c.className='stop-card';
  c.innerHTML='<div class="stop-header"><div class="stop-number" style="background:'+stop.color+'">'+stop.id+'</div><div class="stop-name">'+stop.emoji+' '+stop.name+(stop.event?'<span class="event-badge">'+stop.event+'</span>':'')+'</div></div><div class="stop-dates">'+stop.dates+' &middot; '+stop.country+'</div><div class="stop-nights">'+stop.nights+' noches</div><div class="stop-highlights">'+stop.highlights.join(' &middot; ')+'</div><div class="stop-transport">'+stop.transport+'</div>';
  c.addEventListener('click',function(){jumpToStop(idx);});listEl.appendChild(c);cards.push(c);
});

function showInfoCard(s){var e=document.getElementById('infoCard');e.innerHTML='<div class="info-card-header" style="background:'+s.color+'08;"><div class="info-card-icon" style="background:'+s.color+'12;font-size:26px;">'+s.emoji+'</div><div><div class="info-card-title">'+s.name+'</div><div class="info-card-sub">'+s.dates+' &middot; '+s.nights+' noches &middot; '+s.country+'</div></div></div><div class="info-card-body"><div class="info-card-row"><b>Hostel:</b> '+s.hostel+'</div><div class="info-card-row"><b>Transporte:</b> '+s.transport+'</div><div style="margin-top:6px;">'+s.activities.map(function(a){return'<span class="info-card-activity">'+a+'</span>';}).join('')+'</div><div class="info-card-highlights">'+s.highlights.map(function(h){return'\u2022 '+h;}).join('<br>')+'</div></div>';e.classList.add('show');}
function activateMarker(i){var e=document.getElementById('mi-'+i);if(e){e.style.background=stops[i].color;e.style.borderColor='#fff';e.style.color='#fff';e.style.boxShadow='0 0 10px '+stops[i].color+'55';}}
function getInterval(){return 2000/speeds[speedIdx];}

function animateTravel(fLat,fLng,tLat,tLng,dur,cb){
  var st=performance.now(),te=document.getElementById('traveler');
  if(tLng>fLng)te.style.transform='scaleX(1)';else te.style.transform='scaleX(-1)';
  function step(now){var t=Math.min((now-st)/dur,1);var e=t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;travelerMarker.setLatLng([fLat+(tLat-fLat)*e,fLng+(tLng-fLng)*e]);if(t<1)travelAnimFrame=requestAnimationFrame(step);else if(cb)cb();}
  travelAnimFrame=requestAnimationFrame(step);
}
function dropFP(lat,lng,label){var fp=L.circleMarker([lat,lng],{radius:3,color:'#6366f1',fillColor:'#6366f1',fillOpacity:0.4,weight:0}).addTo(map);if(label)fp.bindTooltip(label,{permanent:false,direction:'top'});footprints.push(fp);}
function updateProgress(){var s=stops[currentStopIdx],d=s.startDay+Math.floor(currentPoiIdx/Math.max(s.pois.length,1)*s.nights),p=Math.min(d,TOTAL_DAYS)/TOTAL_DAYS*100;document.getElementById('progressFill').style.width=p+'%';document.getElementById('dayCounter').textContent='Dia '+Math.min(d,TOTAL_DAYS)+' / '+TOTAL_DAYS;var pn=s.pois[Math.min(currentPoiIdx,s.pois.length-1)];document.getElementById('nowPlaying').innerHTML=s.emoji+' '+s.name+' \u2014 '+(pn?pn.name:s.name);document.querySelectorAll('.progress-dot').forEach(function(d,i){d.classList.toggle('reached',i<=currentStopIdx);});}

function advance(){
  if(!isPlaying)return;var s=stops[currentStopIdx];
  if(currentPoiIdx<s.pois.length){
    var poi=s.pois[currentPoiIdx],pLat=currentPoiIdx===0?s.lat:s.pois[currentPoiIdx-1].lat,pLng=currentPoiIdx===0?s.lng:s.pois[currentPoiIdx-1].lng;
    localTrail.addLatLng([poi.lat,poi.lng]);
    animateTravel(pLat,pLng,poi.lat,poi.lng,getInterval()*0.7,function(){dropFP(poi.lat,poi.lng,poi.name);updateProgress();currentPoiIdx++;if(isPlaying)animationTimer=setTimeout(advance,getInterval()*0.3);});
  }else if(currentStopIdx<stops.length-1){
    var ns=stops[currentStopIdx+1];routeSegments[currentStopIdx].setStyle({opacity:0.8});
    cards[currentStopIdx].classList.add('visited');cards[currentStopIdx].classList.remove('active');
    map.flyToBounds(L.latLngBounds([s.lat,s.lng],[ns.lat,ns.lng]).pad(0.3),{duration:0.8});
    localTrail.setLatLngs([]);document.getElementById('nowPlaying').innerHTML='\u2708\ufe0f Viajando: '+s.name+' \u2192 '+ns.name;
    setTimeout(function(){animateTravel(s.lat,s.lng,ns.lat,ns.lng,getInterval()*2.5,function(){
      currentStopIdx++;currentPoiIdx=0;var n=stops[currentStopIdx];activateMarker(currentStopIdx);showInfoCard(n);
      cards[currentStopIdx].classList.add('active');cards[currentStopIdx].scrollIntoView({behavior:'smooth',block:'center'});
      map.flyTo([n.lat,n.lng],n.zoom,{duration:1});localTrail.addLatLng([n.lat,n.lng]);updateProgress();
      if(isPlaying)animationTimer=setTimeout(advance,getInterval()*1.5);
    });},900);
  }else{
    cards[currentStopIdx].classList.add('visited');isPlaying=false;
    document.getElementById('playBtn').innerHTML='\ud83c\udf89';
    document.getElementById('nowPlaying').innerHTML='\ud83c\udf89 Viaje completado! 28 dias por Portugal';
    document.getElementById('progressFill').style.width='100%';document.getElementById('dayCounter').textContent='Dia 28 / 28';
    map.flyToBounds(routeLine.getBounds().pad(0.1),{duration:1.5});stops.forEach(function(_,i){activateMarker(i);});
  }
}

function togglePlay(){
  isPlaying=!isPlaying;var btn=document.getElementById('playBtn');
  if(isPlaying){btn.innerHTML='&#10074;&#10074;';btn.classList.add('active');
    if(currentStopIdx===0&&currentPoiIdx===0){activateMarker(0);showInfoCard(stops[0]);cards[0].classList.add('active');map.flyTo([stops[0].lat,stops[0].lng],stops[0].zoom,{duration:1});localTrail.addLatLng([stops[0].lat,stops[0].lng]);updateProgress();animationTimer=setTimeout(advance,getInterval()*1.5);}
    else advance();
  }else{btn.innerHTML='&#9654;';btn.classList.remove('active');clearTimeout(animationTimer);cancelAnimationFrame(travelAnimFrame);}
}
function skipStop(dir){clearTimeout(animationTimer);cancelAnimationFrame(travelAnimFrame);jumpToStop(Math.max(0,Math.min(stops.length-1,currentStopIdx+dir)));}
function jumpToStop(idx){
  clearTimeout(animationTimer);cancelAnimationFrame(travelAnimFrame);
  for(var i=0;i<=idx;i++){activateMarker(i);if(i>0&&i-1<routeSegments.length)routeSegments[i-1].setStyle({opacity:0.8});if(i<idx){cards[i].classList.add('visited');cards[i].classList.remove('active');}}
  currentStopIdx=idx;currentPoiIdx=0;var s=stops[idx];
  cards.forEach(function(c){c.classList.remove('active');});cards[idx].classList.add('active');cards[idx].scrollIntoView({behavior:'smooth',block:'center'});
  showInfoCard(s);travelerMarker.setLatLng([s.lat,s.lng]);map.flyTo([s.lat,s.lng],s.zoom,{duration:1});
  localTrail.setLatLngs([[s.lat,s.lng]]);updateProgress();
  if(isPlaying)animationTimer=setTimeout(advance,getInterval()*1.5);
}
function cycleSpeed(){speedIdx=(speedIdx+1)%speeds.length;document.getElementById('speedBtn').textContent=speeds[speedIdx]+'x';}
function seekProgress(e){var r=e.currentTarget.getBoundingClientRect(),p=(e.clientX-r.left)/r.width,d=Math.round(p*TOTAL_DAYS),t=0;for(var i=stops.length-1;i>=0;i--)if(d>=stops[i].startDay){t=i;break;}jumpToStop(t);}
function toggleSidebar(){
  var sb=document.getElementById('sidebar');
  if(window.innerWidth<=600){
    sb.classList.toggle('expanded');
  } else {
    sb.classList.toggle('hidden');
  }
}
setTimeout(function(){map.fitBounds(routeLine.getBounds().pad(0.1));},300);
</script>
</body>
</html>
